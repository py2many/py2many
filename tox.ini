[tox]
envlist = py3{9,10,11,12,13}-{full,all,cpp,dart,dlang,go,julia,kotlin,lean,mojo,nim,rust,smt,vlang,zig}
skip_missing_interpreters = true

[testenv]
passenv =
    HOME
    LocalAppData
    CI
    CXX
    CXX_GCC
    CXXFLAGS
    VFLAGS
    CLANG_FORMAT_STYLE
    CCC_OVERRIDE_OPTIONS
    LD_LIBRARY_PATH
    UPDATE_EXPECTED
    KEEP_GENERATED
    SHOW_ERRORS
    LINT
    GOPATH
    GOCACHE
    JAVA_HOME
    KOTLIN_HOME
    MODULAR_HOME
    MISE_DATA_DIR
    OS
    FOCUS
    PYTEST_ADDOPTS
# Per-OS coverage target: Windows runs fewer language backends (several tools
# lack Windows support), so it can't reach the full-platform target. Windows
# always sets OS=Windows_NT; other OSes leave OS unset, selecting the "_" key.
set_env =
    COV_FAIL_UNDER_ = 88
    COV_FAIL_UNDER_Windows_NT = 85.5
deps =
    py38: importlib-resources
    pytest
    # Coverage is only meaningful when the whole suite runs (full/all).
    full,all: pytest-cov
    black
    astpretty
    # jgo is a Python script that lands on PATH even when no Java is installed,
    # so installing it unconditionally makes the tests that depend on a JVM fail
    # (not skip) under envs without one, e.g. MISE_ENV=lean. Only install it for
    # the factors that exercise it: Kotlin (ktlint + kscript via Maven) and SMT
    # (cljstyle, run via scripts/cljstyle which shells out to jgo).
    kotlin,smt,all,full: jgo<2
    argparse_dataclass
    # adt is needed (at the CPython level, to compute the golden output) by the
    # cases that import it: sealed (rust + python target) and datatypes/
    # triangle_buggy/datatypes_base (smt). Install it for those factors so their
    # cases run instead of skipping with "adt module not installed".
    rust,smt,all,full: git+https://github.com/adsharma/adt/
    full: git+https://github.com/adsharma/Typpete/
    # z3-solver macOS x86_64 wheels from 4.15.5 onward ship an arm64 libz3.dylib;
    # 4.15.4.0 is the last good x86_64 wheel. https://github.com/Z3Prover/z3/issues/9662
    full,all: z3-solver<4.15.5; platform_system == "Darwin" and platform_machine == "x86_64"
changedir = tests
commands =
    # Single-language envs: run without coverage (pytest-cov isn't installed).
    !full-!all: pytest --junitxml=current-results.xml --import-mode=importlib --tb=native --assert=plain --ignore=expected --ignore=ext_expected -rs -v {posargs}
    # full/all run the whole suite, so measure and enforce coverage.
    full,all: pytest --junitxml=current-results.xml --import-mode=importlib --tb=native --assert=plain --ignore=expected --ignore=ext_expected --cov=py2many --cov-report=term-missing:skip-covered -rs -v {posargs:--cov-fail-under={env:COV_FAIL_UNDER_{env:OS:}:88}}
