[tox]
envlist = py3{9,10,11,12,13}-{full,cpp,dart,go,julia,kotlin,nim,smt,vlang,dlang,mojo,zig,rust}
skip_missing_interpreters = true

[testenv]
passenv =
    HOME
    LocalAppData
    CI
    CXX
    CXX_GCC
    CXXFLAGS
    VFLAGS
    CLANG_FORMAT_STYLE
    UPDATE_EXPECTED
    KEEP_GENERATED
    SHOW_ERRORS
    LINT
    GOPATH
    GOCACHE
    JAVA_HOME
    KOTLIN_HOME
    MODULAR_HOME
    FOCUS
    PYTEST_ADDOPTS
deps =
    py38: importlib-resources
    pytest-cov
    black
    astpretty
    jgo<2
    argparse_dataclass
    git+https://github.com/adsharma/adt/
    full: git+https://github.com/adsharma/Typpete/
    # z3-solver macOS x86_64 wheels from 4.15.5 onward ship an arm64 libz3.dylib;
    # 4.15.4.0 is the last good x86_64 wheel. https://github.com/Z3Prover/z3/issues/9662
    full: z3-solver<4.15.5; platform_system == "Darwin" and platform_machine == "x86_64"
changedir = tests
commands =
    pytest --junitxml=current-results.xml --import-mode=importlib --tb=native --assert=plain --ignore=expected --ignore=ext_expected --cov=py2many --cov-report=term-missing:skip-covered -rs -v {posargs:--cov-fail-under=92}
