[tox]
envlist = py3{9,10,11,12,13}-{full,all,cpp,dart,go,julia,kotlin,nim,smt,vlang,dlang,mojo,zig,rust}
skip_missing_interpreters = true

[testenv]
passenv =
    HOME
    LocalAppData
    CI
    CXX
    CXX_GCC
    CXXFLAGS
    VFLAGS
    CLANG_FORMAT_STYLE
    CCC_OVERRIDE_OPTIONS
    LD_LIBRARY_PATH
    UPDATE_EXPECTED
    KEEP_GENERATED
    SHOW_ERRORS
    LINT
    GOPATH
    GOCACHE
    JAVA_HOME
    KOTLIN_HOME
    MODULAR_HOME
    MISE_DATA_DIR
    OS
    FOCUS
    PYTEST_ADDOPTS
# Per-OS coverage target: Windows runs fewer language backends (several tools
# lack Windows support), so it can't reach the full-platform target. Windows
# always sets OS=Windows_NT; other OSes leave OS unset, selecting the "_" key.
set_env =
    COV_FAIL_UNDER_ = 88
    COV_FAIL_UNDER_Windows_NT = 85.5
deps =
    py38: importlib-resources
    pytest-cov
    black
    astpretty
    jgo<2
    argparse_dataclass
    full: git+https://github.com/adsharma/adt/
    full: git+https://github.com/adsharma/Typpete/
    # z3-solver macOS x86_64 wheels from 4.15.5 onward ship an arm64 libz3.dylib;
    # 4.15.4.0 is the last good x86_64 wheel. https://github.com/Z3Prover/z3/issues/9662
    full,all: z3-solver<4.15.5; platform_system == "Darwin" and platform_machine == "x86_64"
changedir = tests
commands =
    pytest --junitxml=current-results.xml --import-mode=importlib --tb=native --assert=plain --ignore=expected --ignore=ext_expected --cov=py2many --cov-report=term-missing:skip-covered -rs -v {posargs:--cov-fail-under={env:COV_FAIL_UNDER_{env:OS:}:88}}
