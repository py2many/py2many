name: Flexible Matrix

# Controls when the action will run.
on:
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:
    inputs:
      focus:
        type: choice
        description: 'Which langauges to test'
        default: ''
        options:
        - cpp
        - dart
        - go
        - julia
        - kotlin
        - nim
        - smt
        - vlang
        - dlang
        - mojo
        - zig
        - ''
      os:
        type: choice
        description: 'Which Ubuntu runner to use for the CI container'
        default: 'ubuntu-24.04'
        options:
        - ubuntu-22.04
        - ubuntu-24.04
      python_version:
        description: 'Which python versions to test'
        default: '["3.12"]'

# Cancel previous jobs for the same branch
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  checks: write
  contents: read
  packages: write

env:
  FOCUS: ${{ github.event.inputs.focus }}
jobs:
  ci-image:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ steps.image.outputs.image }}
      desktop_image: ${{ steps.image.outputs.desktop_image }}

    steps:
      - uses: actions/checkout@v6

      - name: Set image name
        id: image
        shell: bash
        run: |
          image_hash="$(git ls-files docker/Dockerfile docker/entrypoint.sh scripts | sort | xargs sha256sum | sha256sum | cut -d' ' -f1)"
          focus="${FOCUS:-all}"
          image_base="ghcr.io/${GITHUB_REPOSITORY,,}-ci"
          if [ "${focus}" = "all" ]; then
            image="${image_base}:all-${image_hash:0:20}"
            desktop_image="${image_base}:latest"
          else
            image="${image_base}-${focus}:${image_hash:0:20}"
            desktop_image="${image_base}-${focus}:latest"
          fi
          echo "image=${image}" >> "$GITHUB_OUTPUT"
          echo "desktop_image=${desktop_image}" >> "$GITHUB_OUTPUT"
          echo "Developer image: \`${desktop_image}\`" >> "$GITHUB_STEP_SUMMARY"

      - name: Log in to GHCR
        shell: bash
        run: |
          echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Check CI image cache
        id: image-cache
        shell: bash
        run: |
          if docker buildx imagetools inspect "${{ steps.image.outputs.image }}" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create Docker builder
        if: steps.image-cache.outputs.exists != 'true'
        shell: bash
        run: |
          docker buildx create --use

      - name: Build CI image
        if: steps.image-cache.outputs.exists != 'true'
        shell: bash
        run: |
          docker buildx build \
            --cache-from type=gha,scope=py2many-ci \
            --cache-to type=gha,mode=max,scope=py2many-ci \
            --build-arg FOCUS="${FOCUS}" \
            --file docker/Dockerfile \
            --tag "${{ steps.image.outputs.image }}" \
            --tag "${{ steps.image.outputs.desktop_image }}" \
            --push \
            .

  build:
    needs: ci-image

    strategy:
      matrix:
        python-version: ${{ fromJSON(github.event.inputs.python_version)}}
    runs-on: ${{ github.event.inputs.os }}
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - name: Trust checked-out workspace
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      - name: Set KOTLIN_HOME
        if: ${{ !env.FOCUS || env.FOCUS == 'kotlin' }}
        shell: bash
        run: |
          echo KOTLIN_HOME=$(kotlin -e 'System.getProperty("kotlin.home")') >> $GITHUB_ENV

      - name: Install go packages
        if: ${{ !env.FOCUS || env.FOCUS == 'go' }}
        shell: bash
        run: |
          scripts/go-setup.sh

      - name: Install zig packages
        if: ${{ !env.FOCUS || env.FOCUS == 'zig' }}
        shell: bash
        run: |
          scripts/zig-setup.sh

      - name: Install SMT packages
        if: ${{ !env.FOCUS || env.FOCUS == 'smt' }}
        shell: bash
        run: |
          echo "$(pwd)/scripts/" >> $GITHUB_PATH

      - name: Install tox
        run: |
          pip3 --version
          tox --version

      - name: Install C++ packages
        if: ${{ !env.FOCUS || env.FOCUS == 'cpp' }}
        shell: bash
        run: |
          scripts/cpp-setup.sh

      - name: Install V packages
        if: ${{ !env.FOCUS || env.FOCUS == 'vlang' }}
        shell: bash
        run: |
          v install div72.vexc

      - name: Install D Packages
        if: ${{ !env.FOCUS || env.FOCUS == 'dlang' }}
        shell: bash
        run: |
          mkdir -p tests/build && cd tests/build
          dub init -n .
          dub add dfmt
          dub fetch dfmt --cache=local

      - name: Install dart dependencies
        if: ${{ !env.FOCUS || env.FOCUS == 'dart' }}
        shell: bash
        run: |
          scripts/dart-setup.sh

      - name: Install rust nightly toolchain
        if: ${{ !env.FOCUS || env.FOCUS == 'rust' }}
        shell: bash
        run: |
          rustup default nightly-2024-01-01
          rustup component add clippy rustfmt

      - name: Run tox
        shell: bash
        run: |
          set -ex
          PYTHON_VERSION="${{ matrix.python-version }}"
          if [ "$FOCUS" ]; then
            export TOXENV="py${PYTHON_VERSION//.}-${FOCUS}"
            export PYTEST_ADDOPTS="-k $FOCUS"
            tox -v -- --cov-fail-under=0
          else
            export TOXENV="py${PYTHON_VERSION//.}-full"
            tox -v
          fi

      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: "tests/current-results.xml"

      - name: Archive test results
        uses: actions/upload-artifact@v7
        with:
          name: junit-xml-results
          path: tests/current-results.xml


  lint:
    needs: ci-image
    runs-on: ubuntu-latest
    container:
      image: ${{ needs.ci-image.outputs.image }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ github.token }}

    steps:
      - uses: actions/checkout@v6

      - name: Remove expected .py files
        run: rm tests/expected/*.py tests/dir_cases/test1-*-expected/*.py

      - name: Run isort
        run: isort --check --diff */ *.py

      - name: Run black
        run: black --check */ *.py

      - name: Remove test case .py files
        run: rm tests/cases/*.py

      - name: Run flake8
        run: flake8 .

      - name: Run cpplint
        run: cpplint --filter=-legal/copyright,-whitespace/semicolon,-runtime/reference tests/expected/*.cpp
